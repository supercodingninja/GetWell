<!--
================================================================================
This Area Of Code Is: Main Application Page (ROOT level)
Explanation: This is the main app where users view and submit jokes. Features
video background, Firebase integration, card display, and submission form.
Placed at ROOT level (NOT in /public/). Uses YOUR Firebase CDN config.
In Other Words: The main room where all the jokes and fun happens.
================================================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Get Well Card - App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- YOUR Firebase CDN Configuration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDieVA5y_pag35ZVh8P8Pul68sZ_2qtEGU",
            authDomain: "growing-get-well-card.firebaseapp.com",
            projectId: "growing-get-well-card",
            storageBucket: "growing-get-well-card.firebasestorage.app",
            messagingSenderId: "615025378529",
            appId: "1:615025378529:web:38e3801c79f54d852623a0",
            measurementId: "G-REK99P3EKW"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);
        
        // Make available globally
        window.firebaseApp = { db, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp };
    </script>
</head>
<body class="app-page">
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="https://github.com/supercodingninja/GetWell/releases/download/v1.0-videos/video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-brand">
            <a href="index.html">← Back</a>
            <span class="brand">Growing Get Well Card</span>
        </div>
        <div class="nav-filters">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="joke">Jokes</button>
            <button class="filter-btn" data-category="prayer">Prayers</button>
            <button class="filter-btn" data-category="message">Messages</button>
        </div>
        <div class="nav-actions">
            <button id="slideshowBtn" class="icon-btn" title="Start Slideshow">▶</button>
            <button id="addBtn" class="icon-btn" title="Add New">+</button>
        </div>
    </nav>

    <main class="content-area">
        <div id="cardsContainer" class="cards-grid"></div>
    </main>

    <div id="slideshowControls" class="slideshow-controls hidden">
        <span id="slideCounter">1 / 24</span>
        <button id="pauseSlideshow">⏸</button>
        <button id="exitSlideshow">✕</button>
    </div>

    <div id="addModal" class="modal hidden">
        <div class="modal-content glass">
            <h2>Share Encouragement</h2>
            <form id="addForm">
                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" required>
                        <option value="joke">Joke</option>
                        <option value="prayer">Prayer</option>
                        <option value="message">Message</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="content">Your Content:</label>
                    <textarea id="content" rows="4" required placeholder="Enter your joke, prayer, or message..."></textarea>
                    <small class="hint">Keep it clean and encouraging ✝️</small>
                </div>
                <div class="form-group">
                    <label for="author">Your Name (optional):</label>
                    <input type="text" id="author" placeholder="Anonymous">
                </div>
                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loadingSpinner" class="spinner hidden">
        <div class="spinner-circle"></div>
        <p>Loading encouragement...</p>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <footer class="app-footer">
        <p>© 2026 <span class="getwell-text">Get Well</span>. All rights reserved. 
        <span class="frederick-shimmer">Frederick Thomas</span>, 
        <span class="ninja-text">"The Super Coding Ninja™"</span></p>
        <p>Made With 🫶🏿 By Frederick Thomas, "The Super Coding Ninja™"</p>
    </footer>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered:', reg))
                .catch(err => console.log('SW failed:', err));
        }
    </script>
</body>
</html>
