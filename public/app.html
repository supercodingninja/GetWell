<!-- Accessibility Modal (Phase 6 - 9 Color Vision Types) -->
<div class="accessibility-modal" id="accessibilityModal">
    <div class="accessibility-content">
        <div class="accessibility-header">
            <h3>Color Vision Accessibility</h3>
            <p>Select a filter that helps you see better</p>
            <button class="close-modal" onclick="closeAccessibilityModal()" aria-label="Close">×</button>
        </div>

        <!-- Normal Vision -->
        <div class="access-section">
            <div class="access-section-title">Normal Vision</div>
            <div class="vision-grid">
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-normal" value="normal" checked>
                    <label for="cv-normal" class="vision-label">
                        <strong>Standard Colors</strong><br>
                        <small>Default view</small>
                    </label>
                </div>
            </div>
        </div>

        <!-- Red-Green Deficiency (4 types) -->
        <div class="access-section">
            <div class="access-section-title">Red-Green Color Blindness</div>
            <div class="vision-grid">
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-deuteranomaly" value="deuteranomaly">
                    <label for="cv-deuteranomaly" class="vision-label">
                        <strong>Deuteranomaly</strong><br>
                        <small>Green-weak</small>
                    </label>
                </div>
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-deuteranopia" value="deuteranopia">
                    <label for="cv-deuteranopia" class="vision-label">
                        <strong>Deuteranopia</strong><br>
                        <small>Green-blind</small>
                    </label>
                </div>
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-protanomaly" value="protanomaly">
                    <label for="cv-protanomaly" class="vision-label">
                        <strong>Protanomaly</strong><br>
                        <small>Red-weak</small>
                    </label>
                </div>
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-protanopia" value="protanopia">
                    <label for="cv-protanopia" class="vision-label">
                        <strong>Protanopia</strong><br>
                        <small>Red-blind</small>
                    </label>
                </div>
            </div>
        </div>

        <!-- Blue-Yellow Deficiency (2 types) -->
        <div class="access-section">
            <div class="access-section-title">Blue-Yellow Color Blindness</div>
            <div class="vision-grid">
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-tritanomaly" value="tritanomaly">
                    <label for="cv-tritanomaly" class="vision-label">
                        <strong>Tritanomaly</strong><br>
                        <small>Blue-weak</small>
                    </label>
                </div>
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-tritanopia" value="tritanopia">
                    <label for="cv-tritanopia" class="vision-label">
                        <strong>Tritanopia</strong><br>
                        <small>Blue-blind</small>
                    </label>
                </div>
            </div>
        </div>

        <!-- Complete Monochromacy (3 types) -->
        <div class="access-section">
            <div class="access-section-title">Complete Color Blindness</div>
            <div class="vision-grid">
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-achromatopsia" value="achromatopsia">
                    <label for="cv-achromatopsia" class="vision-label">
                        <strong>Achromatopsia</strong><br>
                        <small>Rod monochromacy</small>
                    </label>
                </div>
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-cone-monochromacy" value="cone-monochromacy">
                    <label for="cv-cone-monochromacy" class="vision-label">
                        <strong>Cone Monochromacy</strong><br>
                        <small>Single cone type</small>
                    </label>
                </div>
                <div class="vision-option">
                    <input type="radio" name="colorVision" id="cv-blue-cone-monochromacy" value="blue-cone-monochromacy">
                    <label for="cv-blue-cone-monochromacy" class="vision-label">
                        <strong>Blue Cone Only</strong><br>
                        <small>Blue monochromacy</small>
                    </label>
                </div>
            </div>
        </div>

        <button class="ok-btn" onclick="closeAccessibilityModal()">Apply Selection</button>
    </div>
</div>

<!-- SVG Filters for Color Vision Simulation (hidden) -->
<svg style="display: none;">
    <defs>
        <filter id="deuteranomaly">
            <feColorMatrix type="matrix" values="0.8 0.2 0 0 0  0.258 0.742 0 0 0  0 0.142 0.858 0 0  0 0 0 1 0"/>
        </filter>
        <filter id="deuteranopia">
            <feColorMatrix type="matrix" values="0.625 0.375 0 0 0  0.7 0.3 0 0 0  0 0.3 0.7 0 0  0 0 0 1 0"/>
        </filter>
        <filter id="protanomaly">
            <feColorMatrix type="matrix" values="0.817 0.183 0 0 0  0.333 0.667 0 0 0  0 0.125 0.875 0 0  0 0 0 1 0"/>

            <feColorMatrix type="matrix" values="0.567 0.433 0 0 0  0.558 0.442 0 0 0  0 0.242 0.758 0 0  0 0 0 1 0"/>
        </filter>
        <filter id="tritanomaly">
            <feColorMatrix type="matrix" values="0.967 0.033 0 0 0  0 0.733 0.267 0 0  0 0.183 0.817 0 0  0 0 0 1 0"/>

        <filter id="tritanopia">
            <feColorMatrix type="matrix" values="0.95 0.05 0 0 0  0 0.433 0.567 0 0  0 0.475 0.525 0 0  0 0 0 1 0"/>

    </defs>
</svg>
