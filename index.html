<!-- app.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Well App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="public/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span style="color: #1e40af; font-weight: bold;">Get Well</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <button id="slideshowToggle">▶ Slideshow</button>
        </div>
    </nav>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="https://github.com/supercodingninja/GetWell/releases/download/v1.0-videos/video.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <main class="app-container">
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="jokes">😄 Jokes</button>
            <button class="mode-btn" data-mode="prayers">🙏 Prayers</button>
            <button class="mode-btn" data-mode="messages">💌 Messages</button>
        </div>

        <div class="content-display" id="contentDisplay">
            <div class="glass-card" id="contentCard">
                <div class="card-header">
                    <span id="cardType">Joke</span>
                    <span id="cardNumber">#1</span>
                </div>
                <div class="card-body">
                    <p id="cardText">Loading...</p>
                </div>
                <div class="card-footer">
                    <button id="prevBtn">← Previous</button>
                    <button id="nextBtn">Next →</button>
                </div>
            </div>
        </div>

        <div class="submission-section">
            <button id="addContentBtn">+ Add Your Own</button>
            <div id="submissionForm" style="display: none;">
                <form id="contentForm">
                    <select id="submitType">
                        <option value="jokes">Joke</option>
                        <option value="prayers">Prayer</option>
                        <option value="messages">Message</option>
                    </select>
                    <textarea id="submitText" placeholder="Share something uplifting..." rows="4"></textarea>
                    <div class="char-count">0 / 500</div>
                    <button type="button" id="cancelBtn">Cancel</button>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </main>

    <footer style="position: fixed; bottom: 0; width: 100%; text-align: center; padding: 20px; background: rgba(0,0,0,0.8); color: white;">
        <p>© 2026 <span style="color: #1e40af;">Get Well</span>. All rights reserved. <span style="background: linear-gradient(45deg, #cd7f32, #6b21a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Frederick Thomas</span>, <span style="color: #f97316;">"The Super Coding Ninja™"</span></p>
        <p>Made With 🫶🏿 By <span style="background: linear-gradient(45deg, #cd7f32, #6b21a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Frederick Thomas</span>, <span style="color: #f97316;">"The Super Coding Ninja™"</span></p>
    </footer>

    <script type="module" src="public/app.js"></script>
</body>
</html>
