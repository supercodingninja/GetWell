<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Well Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: -1;
        }
        
        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="text-white min-h-screen">

<!-- Video Background -->
<video class="video-bg" autoplay muted loop playsinline>
    <source src="https://github.com/supercodingninja/GetWell/releases/download/v1.0-videos/video.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div class="min-h-screen flex flex-col items-center justify-center px-4">
    <div class="glass rounded-3xl p-8 sm:p-12 max-w-xl w-full text-center">
        <div class="mb-6 text-6xl">⛪</div>
        
        <h1 class="text-4xl sm:text-5xl font-bold serif mb-4 text-white">Get Well Soon</h1>
        <p class="text-xl text-white/80 mb-2">Your Church Family Loves You</p>
        <p class="text-white/60 mb-8">God Bless You</p>
        
        <a href="public/app.html" class="glass-button inline-flex items-center gap-2 px-8 py-4 rounded-full text-lg font-semibold">
            <i class="ph ph-cards text-xl"></i>
            <span>Open Card</span>
        </a>
    </div>
    
    <footer class="mt-12 text-center text-white/40 text-sm">
        <p>© 2026 Get Well Card</p>
        <p class="mt-1">Frederick Thomas, "The Super Coding Ninja™"</p>
    </footer>
</div>

</body>
</html>
