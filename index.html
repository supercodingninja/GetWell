<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Get Well Card</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body class="landing-page">
    <div class="video-background">
        <video autoplay muted loop playsinline poster="images/church-poster.jpg">
            <source src="https://github.com/supercodingninja/GetWell/releases/download/v1.0-videos/church-interior.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="landing-content">
        <h1>Growing <span class="getwell-text">Get Well</span> Card</h1>
        <p class="subtitle">Community jokes, prayers & encouragement</p>
        
        <a href="app.html" class="enter-btn">
            Enter
            <span class="arrow">→</span>
        </a>
        
        <div class="copyright-attribution">
            <p class="copyright-line">
                © 2026 <span class="getwell-text">Get Well</span>. All rights reserved.<br>
                <span class="frederick-shimmer">Frederick Thomas</span>, 
                <span class="ninja-text">"The Super Coding Ninja™"</span>
            </p>
            <p class="made-with">Made With 🫶🏿 By Frederick Thomas, "The Super Coding Ninja™"</p>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker registered:', reg))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
